name: Stage 2 CI/CD

on:
  push:
    branches:
      - main
      - stage2-audit
  pull_request:

permissions:
  contents: read
  security-events: write
  actions: read


jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python lint dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint Python
        run: python -m flake8 api worker

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint JavaScript
        working-directory: frontend
        run: npx eslint app.js

      - name: Lint Dockerfiles
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile
          docker run --rm -i hadolint/hadolint < worker/Dockerfile
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          pip install -r api/requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: python -m pytest api/tests --cov=api --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag variables
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV
          echo "REGISTRY=localhost:5000" >> $GITHUB_ENV

      - name: Build API image
        run: |
          docker build -t $REGISTRY/api:$IMAGE_TAG -t $REGISTRY/api:latest ./api

      - name: Build worker image
        run: |
          docker build -t $REGISTRY/worker:$IMAGE_TAG -t $REGISTRY/worker:latest ./worker

      - name: Build frontend image
        run: |
          docker build -t $REGISTRY/frontend:$IMAGE_TAG -t $REGISTRY/frontend:latest ./frontend

      - name: Push API image
        run: |
          docker push $REGISTRY/api:$IMAGE_TAG
          docker push $REGISTRY/api:latest

      - name: Push worker image
        run: |
          docker push $REGISTRY/worker:$IMAGE_TAG
          docker push $REGISTRY/worker:latest

      - name: Push frontend image
        run: |
          docker push $REGISTRY/frontend:$IMAGE_TAG
          docker push $REGISTRY/frontend:latest

  security_scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag variables
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build API image for scanning
        run: docker build -t api:${IMAGE_TAG} ./api

      - name: Build worker image for scanning
        run: docker build -t worker:${IMAGE_TAG} ./worker

      - name: Build frontend image for scanning
        run: docker build -t frontend:${IMAGE_TAG} ./frontend

      - name: Enforce CRITICAL scan for API
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: api:${{ env.IMAGE_TAG }}
          format: table
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true
          scanners: vuln

      - name: Enforce CRITICAL scan for worker
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: worker:${{ env.IMAGE_TAG }}
          format: table
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true
          scanners: vuln

      - name: Enforce CRITICAL scan for frontend
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: frontend:${{ env.IMAGE_TAG }}
          format: table
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true
          scanners: vuln

      - name: Generate API SARIF
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: api:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-api.sarif
          exit-code: 0
          ignore-unfixed: true
          scanners: vuln

      - name: Generate worker SARIF
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: worker:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-worker.sarif
          exit-code: 0
          ignore-unfixed: true
          scanners: vuln

      - name: Generate frontend SARIF
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: frontend:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-frontend.sarif
          exit-code: 0
          ignore-unfixed: true
          scanners: vuln

      - name: Upload API SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api

      - name: Upload worker SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-worker.sarif
          category: trivy-worker

      - name: Upload frontend SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CI env file
        run: |
          cat > .env <<EOF
          FRONTEND_PORT=3000
          API_URL=http://api:8000
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_QUEUE=job
          EOF

      - name: Start full stack
        run: docker compose up --build -d

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/ > /dev/null; then
              echo "Frontend is ready"
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs
          exit 1

      - name: Run integration test script
        run: bash scripts/integration-test.sh

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run scripted rolling deployment
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: bash scripts/rolling-deploy.sh

      - name: Clean up deployment containers
        if: always()
        run: |
          docker rm -f frontend-old api-old worker-old redis-deploy frontend-new api-new worker-new 2>/dev/null || true
          docker network rm stage2-deploy 2>/dev/null || true       